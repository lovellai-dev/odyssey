name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src/odyssey

      - name: Pytest
        run: pytest -v

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          failed=0
          for sha in $(git rev-list "$base".."$head"); do
            if ! git log -1 --format='%B' "$sha" | grep -qi '^Signed-off-by:'; then
              echo "::error::Commit $sha is missing 'Signed-off-by:' line"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more commits are missing DCO sign-off. Add 'Signed-off-by: Name <email>' to each commit message."
            exit 1
          fi
          echo "All commits have DCO sign-off."
