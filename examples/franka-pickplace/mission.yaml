# Franka pick-and-place mission (multi-agent): put the can in the bin.
#
# An OpenVLA 7B PILOT (the only trained agent, the only one that acts) guided by a
# multimodal Gemma 4 SPECIALIST task planner running OUT-OF-PROCESS. Train the pilot
# (LoRA) on Bridge V2, then evaluate on Robosuite **PickPlaceCan** — a Franka Panda
# picks a can and drops it in the bin ("put an object in a box"). The planner sees
# the first frame of each episode and decomposes the goal into phases (reach -> grasp
# -> transport -> place) fed to the pilot; PickPlaceCan's long-horizon, multi-stage
# nature is where that decomposition helps. (Single-object variant of PickPlace.)
#
# REQUIRES the out-of-process specialist setup (reuse the multi-agent setup script):
#   examples/multiagent-openvla-gemma/setup.sh        # builds env_pilot + env_specialist
#   source examples/multiagent-openvla-gemma/.env     # exports ODYSSEY_SPECIALIST_PYTHON
# Gemma 4 needs a modern transformers/torchvision (incompatible with OpenVLA's pinned
# 4.40.1), so the SPECIALIST can ONLY run out-of-process. Without
# ODYSSEY_SPECIALIST_PYTHON the eval fails fast with a clear error.
#
# Hardware: 24 GB GPU (L4) — int4 E2B-it planner (~5 GB) + ~14 GB bf16 pilot ≈ 19 GB peak.
#
# ⚠️ Domain gap: Bridge V2 is REAL-robot data (WidowX); this eval is a Franka Panda in
# SIM. A fresh LoRA rarely succeeds zero-/few-shot, and the planner sequences
# sub-instructions but does NOT close that gap — real successes need hours of training
# (not the 10-step smoke). Bridge has many "put X in a container" demos, so the task
# is at least well aligned with the training data.

odysseyVersion: "0.1"
kind: Mission

metadata:
  name: franka-pickplace-can
  description: Multi-agent — OpenVLA pilot (Bridge V2) + Gemma 4 planner, eval on Robosuite PickPlaceCan (Franka puts a can in the bin).
  tags: [openvla, gemma, multiagent, robosuite, pickplace, franka]

objective: |
  Demonstrate that an OpenVLA 7B pilot, guided by an out-of-process multimodal
  Gemma 4 task planner, can pick up a can and place it in the bin with a Franka
  Panda in the Robosuite PickPlaceCan task.

acceptance_criteria: |
  At least one successful can-in-bin placement across the evaluation episodes.

robot:
  embodiment: franka_panda
  agents:
    - id: pilot
      role: PILOT
      model:
        source: huggingface
        base: openvla/openvla-7b

    - id: task-planner
      role: SPECIALIST
      model:
        source: huggingface
        # Vision-language planner, runs in env_specialist (out-of-process). Gemma 4
        # E2B-it is multimodal and ungated (downloads without a token); it sees the
        # first episode frame so the plan is grounded in the scene. E2B (not E4B) so
        # it fits alongside the ~14 GB pilot.
        base: google/gemma-4-E2B-it
        quantization: int4
        modality: multimodal

tasks:
  - name: finetune-pilot
    kind: training
    training_type: demonstration
    agent_id: pilot
    dataset:
      source: oxe
      ref: bridge_orig            # OXE registry key OpenVLA's finetune.py looks up
      format: rlds
    config:
      method: peft_lora
      lora_rank: 8
      lora_alpha: 16
      batch_size: 2
      learning_rate: 5.0e-5
      max_steps: 5000             # ~1 h on an L4 for a real attempt; lower (e.g. 10) for a quick pipeline smoke
      save_steps: 1000
      epochs: 1                   # ignored when max_steps is set
      data_root_dir: /path/to/dataset   # EDIT: parent dir of the RLDS folder (e.g. /home/<user>)
      shuffle_buffer_size: 10000  # small buffer — the 256k default eats 32 GB RAM and freezes g2-standard-8

  - name: eval-franka-pickplace-can
    kind: evaluation
    evaluation_type: robosuite
    benchmark_name: PickPlaceCan
    num_episodes: 10
    config:
      unnorm_key: bridge_orig
      task_instruction: "put the can in the bin"   # high-level goal the planner decomposes
      capture_video: true        # one MP4 per episode (see README -> "Recording rollout videos")
