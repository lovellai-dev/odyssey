# Multi-agent mission: OpenVLA PILOT + ADVANCED Gemma SPECIALIST (out-of-process).
#
# Same plan-then-execute eval as mission.yaml, but the SPECIALIST is a much more
# capable Gemma 2 9B running in a SEPARATE venv/process — free of OpenVLA's
# pinned transformers==4.40.1 (which only allows Gemma 1 in-process).
#
# REQUIRES the out-of-process setup (see README "Multi-agent evaluation"):
#   python -m venv ~/specialist-venv
#   ~/specialist-venv/bin/pip install -e ".[specialist]" -c constraints/specialist-known-good.txt
#   export ODYSSEY_SPECIALIST_PYTHON=~/specialist-venv/bin/python
# Without ODYSSEY_SPECIALIST_PYTHON this mission FAILS at eval — the main venv's
# transformers 4.40.1 cannot load Gemma 2. (Use mission.yaml for the in-process
# Gemma 1 path.)
#
# Hardware: 24 GB GPU (L4). Peak VRAM ~20 GB (14 GB PILOT bf16 +
# ~6 GB SPECIALIST int4) — the venv split solves the *dependency* conflict, not
# VRAM, so both still share the GPU.

odysseyVersion: "0.1"
kind: Mission

metadata:
  name: multiagent-lift-advanced
  description: >
    Multi-agent evaluation — OpenVLA pilot fine-tuned on Bridge V2, with an
    advanced Gemma 2 9B task planner running out-of-process. Evaluated on the
    Robosuite Lift benchmark.
  tags: [multiagent, openvla, gemma, robosuite, out-of-process]

objective: |
  Demonstrate that an OpenVLA pilot guided by an advanced (out-of-process)
  Gemma planner can pick up a cube in simulation.

acceptance_criteria: |
  At least one successful lift across the evaluation episodes.

robot:
  embodiment: franka_panda
  agents:
    - id: pilot
      role: PILOT
      model:
        source: huggingface
        base: openvla/openvla-7b

    - id: task-planner
      role: SPECIALIST
      model:
        source: huggingface
        # Advanced text planner — runs in the specialist venv (modern
        # transformers), so it is NOT bound by OpenVLA's 4.40.1 pin. Gemma 2 is
        # text-only, so it loads cleanly via GemmaTextGenerator (AutoModelForCausalLM).
        # (Gemma 3 4B/12B are multimodal and would need a loader change.)
        base: google/gemma-2-9b-it
        quantization: int4

tasks:
  - name: finetune-pilot
    kind: training
    training_type: demonstration
    agent_id: pilot
    dataset:
      source: oxe
      ref: bridge_orig
      format: rlds
    config:
      method: peft_lora
      lora_rank: 8
      lora_alpha: 16
      batch_size: 2
      learning_rate: 5.0e-5
      max_steps: 10
      save_steps: 5
      epochs: 1
      data_root_dir: /home/gema
      # Keep the RLDS shuffle buffer small — the upstream default (256k) eats
      # all 32 GB RAM on g2-standard-8 and freezes the VM.
      shuffle_buffer_size: 10000

  - name: eval-robosuite-lift
    kind: evaluation
    evaluation_type: robosuite
    benchmark_name: Lift
    num_episodes: 2
    config:
      unnorm_key: bridge_orig

leaderboard:
  publish: false

graph:
  contribute: false
